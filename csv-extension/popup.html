<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Buylist CSV Fixer</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div class="header-row">
      <div>
        <h1>Buylist CSV Fixer</h1>
        <p class="subtitle">Upload a CSV, rename <code>Product ID</code> → <code>Product_ID</code>, and preview quantities.</p>
      </div>
      <button id="popOutBtn" class="pop-out-btn" title="Open in a separate window that stays open">⧉</button>
    </div>

    <label class="dropzone" id="dropzone" for="fileInput">
      <span id="dropzoneText">Click to choose a CSV, or drag &amp; drop it here</span>
      <input type="file" id="fileInput" accept=".csv" hidden />
    </label>

    <div id="fileInfo" class="file-info hidden"></div>

    <div class="actions">
      <button id="downloadBtn" disabled>Download fixed CSV</button>
      <button id="clearBtn" class="secondary" disabled>Clear</button>
    </div>

    <div id="status" class="status"></div>

    <div class="quantities-section">
      <div class="quantities-header">
        <h2>Quantity values</h2>
        <span id="quantityCount" class="badge">0</span>
      </div>
      <div id="quantityList" class="quantity-list empty">
        No CSV loaded yet.
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
